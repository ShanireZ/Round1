# Round 1 — 本地开发基础设施
# 要求: Docker Desktop (WSL2 backend)
#
# 启动:  docker compose -f docker-compose.dev.yml up -d
# 停止:  docker compose -f docker-compose.dev.yml down
# 重置:  docker compose -f docker-compose.dev.yml down -v
# 端口仅绑定 127.0.0.1，避免本地数据库/Redis/runner 暴露到局域网。
# 宿主机端口按 Round1 端口规划使用 4397/4395/4401；容器内仍保留 Postgres/Redis 官方默认端口。
# PostgreSQL 18 镜像要求 volume 挂到 /var/lib/postgresql，由镜像在内部创建版本化
# data 子目录；旧的 /var/lib/postgresql/data 挂载会导致容器启动失败。
# 若本地已有旧布局 pgdata，需要备份后重建 volume。

services:
  pg:
    image: postgres:18
    container_name: r1-pg
    restart: unless-stopped
    ports:
      - "127.0.0.1:4397:5432"
    environment:
      POSTGRES_DB: round1
      POSTGRES_USER: round1
      POSTGRES_PASSWORD: round1_dev
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U round1 -d round1"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: r1-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:4395:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  cpp-runner:
    build:
      context: ./cpp-runner
      dockerfile: Dockerfile
    container_name: r1-cpp-runner
    restart: unless-stopped
    ports:
      - "127.0.0.1:4401:4401"
    environment:
      PORT: 4401
      COMPILE_TIMEOUT_MS: 10000
      RUN_TIMEOUT_MS: 1000
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:4401/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pgdata:
  redisdata:
